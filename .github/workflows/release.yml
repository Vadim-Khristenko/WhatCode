name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.7.2)"
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  BIN_NAME: whatcode

jobs:
  # ---------------------------------------------------------------------------
  # 0. Разрешаем версию один раз для всех джобов.
  # ---------------------------------------------------------------------------
  meta:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        run: |
          version="${{ github.event.inputs.tag || github.ref_name }}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "## 🚀 WhatCode $version" >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # 1. Десктоп-бинари. Каждый таргет кладёт архив как build-artifact (без гонок).
  # ---------------------------------------------------------------------------
  build:
    name: build ${{ matrix.target }}
    needs: meta
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v7

      - name: Install pinned Rust toolchain + target
        shell: bash
        run: |
          channel="$(sed -n 's/^[[:space:]]*channel[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' rust-toolchain.toml)"
          channel="${channel:-stable}"
          echo "::notice::Rust $channel → target ${{ matrix.target }}"
          rustup toolchain install "$channel" --profile minimal
          rustup default "$channel"
          rustup target add ${{ matrix.target }}
          rustc -V && cargo -V

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross linker (aarch64 linux)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }} --bin ${{ env.BIN_NAME }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          staging="${BIN_NAME}-${{ needs.meta.outputs.version }}-${{ matrix.target }}"
          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "$staging/"
          cp README.md LICENSE .env.example "$staging/" 2>/dev/null || true
          tar czf "$staging.tar.gz" "$staging"
          echo "ASSET=$staging.tar.gz" >> "$GITHUB_ENV"
          size=$(du -h "target/${{ matrix.target }}/release/${BIN_NAME}" | cut -f1)
          echo "- ✅ \`${{ matrix.target }}\` — $size" >> "$GITHUB_STEP_SUMMARY"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $staging = "$env:BIN_NAME-${{ needs.meta.outputs.version }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/$env:BIN_NAME.exe" $staging
          Copy-Item README.md, LICENSE, .env.example $staging -ErrorAction SilentlyContinue
          Compress-Archive -Path $staging -DestinationPath "$staging.zip"
          "ASSET=$staging.zip" | Out-File -FilePath $env:GITHUB_ENV -Append
          $size = "{0:N1} MB" -f ((Get-Item "target/${{ matrix.target }}/release/$env:BIN_NAME.exe").Length / 1MB)
          "- ✅ ``${{ matrix.target }}`` — $size" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: dist-${{ matrix.target }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 2. Android (aarch64) через предустановленный NDK раннера — best-effort.
  # ---------------------------------------------------------------------------
  android:
    name: build android (aarch64)
    needs: meta
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - name: Install pinned Rust toolchain + Android target
        shell: bash
        run: |
          channel="$(sed -n 's/^[[:space:]]*channel[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' rust-toolchain.toml)"
          channel="${channel:-stable}"
          rustup toolchain install "$channel" --profile minimal
          rustup default "$channel"
          rustup target add aarch64-linux-android
          rustc -V && cargo -V
      - uses: Swatinem/rust-cache@v2
        with:
          key: android-release
      - name: Build for Android (runner NDK)
        shell: bash
        run: |
          export ANDROID_NDK_HOME="${ANDROID_NDK_HOME:-$ANDROID_NDK_LATEST_HOME}"
          echo "::notice::Using preinstalled NDK at $ANDROID_NDK_HOME"
          ./scripts/build-android.sh
      - name: Package Termux binary
        shell: bash
        run: |
          mkdir -p artifacts
          staging="${BIN_NAME}-${{ needs.meta.outputs.version }}-aarch64-linux-android"
          mkdir -p "$staging"
          cp "target/aarch64-linux-android/release/${BIN_NAME}" "$staging/"
          cp README.md LICENSE .env.example "$staging/" 2>/dev/null || true
          tar czf "artifacts/$staging.tar.gz" "$staging"
          size=$(du -h "target/aarch64-linux-android/release/${BIN_NAME}" | cut -f1)
          echo "- ✅ \`aarch64-linux-android\` — $size (бинарь для Termux)" >> "$GITHUB_STEP_SUMMARY"

      # --- сборка APK (UI-обёртка над бинарём) ---
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"
      - name: Build APK
        shell: bash
        run: |
          # Кладём нативный бинарь как libwhatcode.so (единственный способ иметь
          # исполняемый файл в APK — файлы из nativeLibraryDir можно запускать).
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          cp "target/aarch64-linux-android/release/${BIN_NAME}" \
             android/app/src/main/jniLibs/arm64-v8a/libwhatcode.so
          echo "sdk.dir=${ANDROID_SDK_ROOT:-$ANDROID_HOME}" > android/local.properties
          ( cd android && gradle :app:assembleRelease --no-daemon --console=plain )
          apk="artifacts/${BIN_NAME}-${{ needs.meta.outputs.version }}-android.apk"
          cp android/app/build/outputs/apk/release/app-release.apk "$apk"
          size=$(du -h "$apk" | cut -f1)
          echo "- ✅ \`android.apk\` — $size (UI-обёртка, debug-подпись)" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: dist-android
          path: artifacts/*
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 3. Debian / Ubuntu .deb через cargo-deb.
  # ---------------------------------------------------------------------------
  debian:
    name: package .deb
    needs: meta
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - name: Install pinned Rust toolchain
        shell: bash
        run: |
          channel="$(sed -n 's/^[[:space:]]*channel[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' rust-toolchain.toml)"
          channel="${channel:-stable}"
          rustup toolchain install "$channel" --profile minimal
          rustup default "$channel"
      - uses: Swatinem/rust-cache@v2
        with:
          key: debian
      - name: Install cargo-deb
        run: cargo install cargo-deb --locked
      - name: Build .deb
        run: cargo deb -p whatcode-cli --output "whatcode_${{ needs.meta.outputs.version }}_amd64.deb"
      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: dist-deb
          path: whatcode_${{ needs.meta.outputs.version }}_amd64.deb
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 4. Единая публикация: собираем все артефакты и создаём релиз ОДИН раз.
  #    Так исключены гонки параллельных upload'ов в один черновик.
  # ---------------------------------------------------------------------------
  publish:
    name: Publish release
    needs: [meta, build, android, debian]
    if: ${{ always() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true
      - name: List collected assets
        run: |
          echo "Собранные артефакты:"
          find dist -type f | sort
      - name: Create release with all assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.meta.outputs.version }}
          name: WhatCode ${{ needs.meta.outputs.version }}
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.deb
            dist/*.apk
      - name: Summary
        run: |
          {
            echo "## 📦 Прикреплено к релизу ${{ needs.meta.outputs.version }}"
            for f in dist/*.tar.gz dist/*.zip dist/*.deb dist/*.apk; do
              [ -f "$f" ] && echo "- $(basename "$f")"
            done
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # 5. Arch Linux: PKGBUILD и (опционально) публикация в AUR. Не блокирует релиз.
  # ---------------------------------------------------------------------------
  arch-aur:
    name: Arch AUR PKGBUILD
    needs: [meta, build]
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      AUR_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v7
      - name: Render PKGBUILD
        run: |
          version="${{ needs.meta.outputs.version }}"
          version_clean="${version#v}"
          tarball="${BIN_NAME}-${version}-x86_64-unknown-linux-gnu.tar.gz"
          url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${version}/${tarball}"
          sed -e "s/@VERSION@/${version_clean}/g" \
              -e "s|@URL@|${url}|g" \
              packaging/aur/PKGBUILD.in > PKGBUILD
          cat PKGBUILD
      - name: Upload PKGBUILD artifact
        uses: actions/upload-artifact@v5
        with:
          name: aur-pkgbuild
          path: PKGBUILD
      - name: Publish to AUR
        # Публикуем только при наличии секрета. Экшен пиннится ТОЧНОЙ версией:
        # у github-actions-deploy-aur нет плавающих мажорных тегов (@v3/@v4),
        # поэтому ссылка вида @v4 приводит к «action not found».
        if: ${{ env.AUR_KEY != '' }}
        uses: KSXGitHub/github-actions-deploy-aur@v4.2.0
        with:
          pkgname: whatcode-bin
          pkgbuild: ./PKGBUILD
          commit_username: VAI PROG
          commit_email: vadim@vai-rice.space
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ needs.meta.outputs.version }}"

  # ---------------------------------------------------------------------------
  # 6. NixOS: проверяем, что flake собирается.
  # ---------------------------------------------------------------------------
  nix:
    name: Nix build
    needs: meta
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: "experimental-features = nix-command flakes"
      - name: Build flake
        run: nix build .#default --print-build-logs

  # ---------------------------------------------------------------------------
  # 7. Финальная сводка релиза.
  # ---------------------------------------------------------------------------
  release-summary:
    name: Release summary
    if: always()
    needs: [meta, build, android, debian, publish, arch-aur, nix]
    runs-on: ubuntu-latest
    steps:
      - name: Report
        run: |
          {
            echo "## 📋 Итог релиза ${{ needs.meta.outputs.version }}"
            echo ""
            echo "| Джоб | Статус |"
            echo "|------|--------|"
            echo "| desktop-бинари | ${{ needs.build.result }} |"
            echo "| android | ${{ needs.android.result }} |"
            echo "| .deb | ${{ needs.debian.result }} |"
            echo "| публикация релиза | ${{ needs.publish.result }} |"
            echo "| AUR | ${{ needs.arch-aur.result }} |"
            echo "| Nix | ${{ needs.nix.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ needs.build.result }}" != "success" ] || [ "${{ needs.publish.result }}" != "success" ]; then
            echo "::error::публикация релиза не удалась"
            exit 1
          fi
