# WhatCode — cargo configuration.
#
# Сборка под Android выполняется скриптом `scripts/build-android.sh`, который
# выставляет линкер и CC/AR из NDK через переменные окружения (это переносимо и
# не привязано к путям конкретной машины). Ручной путь:
#
#   export ANDROID_NDK_HOME=/path/to/android-ndk
#   ./scripts/build-android.sh                 # aarch64, release
#
# Либо задайте переменные напрямую (пример для aarch64, API 24):
#
#   NDK=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin
#   export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$NDK/aarch64-linux-android24-clang
#   export CC_aarch64_linux_android=$NDK/aarch64-linux-android24-clang
#   export AR_aarch64_linux_android=$NDK/llvm-ar
#   cargo build -p whatcode-cli --target aarch64-linux-android --release
#
# В Termux на самом устройстве NDK не нужен — используется системный clang:
#   pkg install rust && cargo build -p whatcode-cli --release
